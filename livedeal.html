<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MOCAS LiveDeal</title>

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #d94f70;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 36px;
    }

    .deal-row {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: center;
    }

    .deal-box {
      background: #fff7fa;
      border: 1px solid #f3c8d4;
      border-radius: 16px;
      padding: 18px;
    }

    .pill {
      display: inline-block;
      background: #fee2e2;
      color: #7f1d1d;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .deal-text {
      font-size: 22px;
      line-height: 1.4;
    }

    .timer {
      background: linear-gradient(135deg,#0f172a,#020617);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .timer-grid {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
    }

    .time-unit {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      color: white;
    }

    .time-value {
      font-size: 26px;
      font-weight: 700;
    }

    .time-label {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      .deal-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>LiveDeal</h1>

      <div class="deal-row">
        <div class="deal-box">
          <div class="pill">LIVE NOW</div>
          <div class="deal-text" id="deal-text">
            Spring special: buy 3 or more items and get 10% off.
          </div>
        </div>

        <div class="timer">
          <div class="timer-grid">
            <div class="time-unit">
              <div class="time-value" id="d">--</div>
              <div class="time-label">D</div>
            </div>
            <div class="time-unit">
              <div class="time-value" id="h">--</div>
              <div class="time-label">H</div>
            </div>
            <div class="time-unit">
              <div class="time-value" id="m">--</div>
              <div class="time-label">M</div>
            </div>
            <div class="time-unit">
              <div class="time-value" id="s">--</div>
              <div class="time-label">S</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const END_TIME = new Date("2026-03-31T23:59:59");

    function pad(n) {
      return String(n).padStart(2,'0');
    }

    function update() {
      const now = new Date();
      const diff = END_TIME - now;

      if (diff <= 0) {
        ['d','h','m','s'].forEach(id => document.getElementById(id).textContent = "00");
        return;
      }

      const t = Math.floor(diff / 1000);

      const d = Math.floor(t / 86400);
      const h = Math.floor((t % 86400) / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;

      document.getElementById('d').textContent = pad(d);
      document.getElementById('h').textContent = pad(h);
      document.getElementById('m').textContent = pad(m);
      document.getElementById('s').textContent = pad(s);
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
