<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MOCAS Official LiveDeal</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --line:#e5e7eb;
}

body{
  margin:0;
  padding:40px 20px;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:900px;
  margin:0 auto;
}

.page{
  background:var(--card);
  border-radius:20px;
  padding:28px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h1{
  margin:0 0 18px;
  font-size:24px;
}

.deal-list{
  display:grid;
  gap:16px;
}

.deal-card{
  position:relative;
  background:white;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  min-height:140px;
}

.deal-box{
  background:#fff7fa;
  border:1px solid #f3c8d4;
  border-radius:16px;
  padding:16px;
  padding-right:170px; /* space for timer */
}

.pill{
  display:inline-block;
  background:#fee2e2;
  color:#7f1d1d;
  font-weight:700;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  margin-bottom:8px;
}

.deal-title{
  font-size:16px;
  font-weight:700;
  line-height:1.3;
}

.deal-note{
  margin-top:6px;
  font-size:11px;
  color:var(--muted);
}

.timer{
  position:absolute;
  right:14px;
  bottom:14px;
  background:linear-gradient(135deg,#0f172a,#020617);
  border-radius:14px;
  padding:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
}

.timer-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.time-unit{
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  padding:8px 6px;
  text-align:center;
  color:white;
}

.time-value{
  font-size:14px;
  font-weight:700;
}

.time-label{
  font-size:9px;
  opacity:.75;
}

.empty{
  display:none;
  text-align:center;
  padding:20px;
  border-radius:16px;
  border:1px solid #f3c8d4;
  background:#fff7fa;
  color:var(--muted);
}

@media (max-width:700px){
  .deal-box{
    padding-right:16px;
  }

  .timer{
    position:static;
    margin-top:12px;
  }
}
</style>
</head>

<body>
<div class="wrap">
<div class="page">

<h1>MOCAS LiveDeal</h1>

<div id="deal-list" class="deal-list"></div>
<div id="empty" class="empty">No live deals right now.</div>

</div>
</div>

<script>
const DEALS = [
  {
    title:"Early Bird Deal → Free Attribute Additions",
    note:"Removes all keychain and coating costs! Available only until Opening Day!",
    startTime:"2026-03-27T23:59:59"
    endTime:"2026-03-31T23:59:59"
  },
  {
    title:"Opening Week Discount → 15% off Everything!",
    note:"For a limited time, any and all purchases fall under this discount!",
    startTime:"2026-03-31T23:59:59"
    endTime:"2026-04-07T23:59:59"
  }
];

const list = document.getElementById("deal-list");
const empty = document.getElementById("empty");

function pad(n){ return String(n).padStart(2,"0"); }

function getStatus(deal) {
  const now = Date.now();
  const start = new Date(deal.startTime).getTime();
  const end = new Date(deal.endTime).getTime();

  if (now < start) return "upcoming";
  if (now >= start && now < end) return "active";
  return "expired";
}
  
function remaining(t){
  const diff = new Date(t) - Date.now();
  if(diff <= 0) return null;

  const s = Math.floor(diff/1000);
  return {
    d:Math.floor(s/86400),
    h:Math.floor((s%86400)/3600),
    m:Math.floor((s%3600)/60),
    s:s%60
  };
}

function render(){
  const active = DEALS.filter(d => getStatus(d) !== "expired");
  if(!active.length){
    list.innerHTML="";
    empty.style.display="block";
    return;
  }

  empty.style.display="none";

  list.innerHTML = active.map((deal,i)=>{
      const status = getStatus(deal);

      const t = status === "active"? remaining(deal.endTime) : remaining(deal.startTime);

    return `
    <div class="deal-card">
      <div class="deal-box">
        <div class="pill">
          ${status === "active" ? "LIVE NOW" : "COMING SOON"}
        </div>
        <div class="deal-title">${deal.title}</div>
        <div class="deal-note">${deal.note || ""}</div>
      </div>

      <div class="timer">
      <div style="color:white;font-size:10px;margin-bottom:6px;opacity:.7;">
        ${status === "active" ? "ENDS IN" : "STARTS IN"}
      </div>
        <div class="timer-grid">
          <div class="time-unit"><div class="time-value">${pad(t.d)}</div><div class="time-label">D</div></div>
          <div class="time-unit"><div class="time-value">${pad(t.h)}</div><div class="time-label">H</div></div>
          <div class="time-unit"><div class="time-value">${pad(t.m)}</div><div class="time-label">M</div></div>
          <div class="time-unit"><div class="time-value">${pad(t.s)}</div><div class="time-label">S</div></div>
        </div>
      </div>
    </div>
    `;
  }).join("");
}

render();
setInterval(render,1000);
</script>
</body>
</html>
